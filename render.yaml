services:
  - type: web
    name: shl-ai-recommender
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt && python scraper.py && python embeddings.py
    startCommand: uvicorn app:app --host 0.0.0.0 --port 10000
    envVars:
      - key: GROQ_KEY
        sync: false
      - key: MODEL_NAME
        value: llama-3.3-70b-versatile